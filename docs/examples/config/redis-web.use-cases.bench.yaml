base_config: ../../examples/config/webdis.json
output_dir: ../../../target/perf
variants:
  - name: edge-rest-8-workers
    overrides:
      runtime_worker_threads: 8
      http_threads: 8
      pool_size_per_thread: 25

  - name: edge-rest-16-workers
    overrides:
      runtime_worker_threads: 16
      http_threads: 16
      pool_size_per_thread: 25

  - name: browser-realtime-sse
    overrides:
      runtime_worker_threads: 8
      http_threads: 8
      pool_size_per_thread: 25

  - name: browser-realtime-ws
    overrides:
      websockets: true
      runtime_worker_threads: 8
      http_threads: 8
      pool_size_per_thread: 25

  - name: sidecar-loopback
    overrides:
      http_host: 127.0.0.1
      runtime_worker_threads: 2
      http_threads: 2
      pool_size_per_thread: 4

  - name: ingest-rest-high-pool
    overrides:
      runtime_worker_threads: 8
      http_threads: 12
      pool_size_per_thread: 50

  - name: grpc-mesh-4-workers
    overrides:
      transport_mode: grpc
      runtime_worker_threads: 4
      http_threads: 4
      pool_size_per_thread: 10
      grpc:
        host: 127.0.0.1
        enable_health_service: true
        enable_reflection: false

  - name: grpc-mesh-8-workers
    overrides:
      transport_mode: grpc
      runtime_worker_threads: 8
      http_threads: 8
      pool_size_per_thread: 25
      grpc:
        host: 127.0.0.1
        enable_health_service: true
        enable_reflection: false

  - name: grpc-debuggable
    overrides:
      transport_mode: grpc
      runtime_worker_threads: 8
      http_threads: 8
      pool_size_per_thread: 25
      grpc:
        host: 127.0.0.1
        enable_health_service: true
        enable_reflection: true

  - name: grpc-ingest-8-workers
    overrides:
      transport_mode: grpc
      runtime_worker_threads: 8
      http_threads: 12
      pool_size_per_thread: 50
      grpc:
        host: 127.0.0.1
        enable_health_service: true
        enable_reflection: false
