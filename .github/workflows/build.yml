name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tier (Redis/process/socket tests)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
            code:
              - '**'
              - '!docs/**'

  pr-sanity-build:
    name: pr sanity build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.code == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev ca-certificates

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Sanity build
        run: cargo build --workspace

  pr-rust-tests:
    name: pr rust tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.code == 'true' }}
    services:
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev ca-certificates redis-tools

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Wait for Redis
        run: |
          set -euo pipefail
          for _ in {1..40}; do
            if redis-cli -h 127.0.0.1 -p 6379 ping >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "redis service not reachable on 127.0.0.1:6379" >&2
          exit 1

      - name: Run Rust tests
        run: |
          cargo test --workspace --lib
          cargo test -p redis-web \
            --test config_test \
            --test handler_test \
            --test functional_interface_mapping_test \
            --test functional_http_contract_test \
            --test functional_ws_contract_test \
            --test integration_hiredis_compat_test

  ci-linux:
    name: linux (${{ matrix.os_name }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' && github.event_name != 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os_name: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os_name: ubuntu-24.04-arm
            arch: aarch64
    services:
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev ca-certificates redis-tools

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache: true

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version

      - name: Wait for Redis
        run: |
          set -euo pipefail
          for _ in {1..40}; do
            if redis-cli -h 127.0.0.1 -p 6379 ping >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "redis service not reachable on 127.0.0.1:6379" >&2
          exit 1

      - name: Build
        run: cargo build --release --workspace

      - name: Compile test binaries (regression guard)
        run: cargo test --release -p redis-web --tests --no-run

      - name: Run unit tests
        run: cargo test --release --workspace --lib

      - name: Run functional tests
        run: |
          cargo test --release -p redis-web \
            --test config_test \
            --test handler_test \
            --test functional_interface_mapping_test \
            --test functional_http_contract_test \
            --test functional_ws_contract_test

      - name: Run integration tests
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true') }}
        run: |
          cargo test --release -p redis-web \
            --test integration_process_boot_test \
            --test integration_redis_http_test \
            --test integration_redis_pubsub_test \
            --test integration_redis_socket_test \
            --test websocket_raw_test \
            --test integration_hiredis_compat_test

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-web-${{ matrix.os_name }}-${{ matrix.arch }}.log
          path: |
            redis-web.log
            webdis.log
          if-no-files-found: ignore

  ci-macos:
    name: macos (${{ matrix.os_name }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' && github.event_name != 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os_name: macos-14
            arch: arm64
          - runner: macos-15
            os_name: macos-15
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          brew install redis openssl@3 pkg-config || true
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Start Redis
        run: |
          set -euo pipefail
          brew services start redis || true
          for _ in {1..20}; do
            if redis-cli ping >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "redis failed to start" >&2
          exit 1

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --release --workspace

      - name: Compile test binaries (regression guard)
        run: cargo test --release -p redis-web --tests --no-run

      - name: Run unit tests
        run: cargo test --release --workspace --lib

      - name: Run functional tests
        run: |
          cargo test --release -p redis-web \
            --test config_test \
            --test handler_test \
            --test functional_interface_mapping_test \
            --test functional_http_contract_test \
            --test functional_ws_contract_test

      - name: Run integration tests
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true') }}
        run: |
          cargo test --release -p redis-web \
            --test integration_process_boot_test \
            --test integration_redis_http_test \
            --test integration_redis_pubsub_test \
            --test integration_redis_socket_test \
            --test websocket_raw_test \
            --test integration_hiredis_compat_test

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-web-${{ matrix.os_name }}-${{ matrix.arch }}.log
          path: |
            redis-web.log
            webdis.log
          if-no-files-found: ignore

  docs:
    name: docs build + links
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' && github.event_name != 'pull_request' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache docs dependencies
        uses: actions/cache@v4
        id: docs-cache
        with:
          path: |
            docs/node_modules
            ~/.bun/install/cache
          key: docs-bun-${{ runner.os }}-${{ hashFiles('docs/bun.lock', 'docs/package.json') }}
          restore-keys: |
            docs-bun-${{ runner.os }}-

      - name: Install docs dependencies
        if: steps.docs-cache.outputs.cache-hit != 'true'
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Astro check
        working-directory: docs
        run: bun run check

      - name: Build docs (Pages-equivalent)
        working-directory: docs
        run: bun run build

      - name: Validate local docs links
        working-directory: docs
        run: bun run check-links

  rename-guard:
    name: rename guard
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure legacy name only appears in allowlisted paths
        run: ./scripts/check-webdis-references.sh
