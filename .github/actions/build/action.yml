#!/usr/bin/env bash
# Maintainer Notes: Build and test composite action. Inputs: `arch`, `run-tests`, `qemu`, `os_name`.
# - Uses `.github/actions/setup-rust` to perform toolchain setup and caching.
# - Runs tests natively for host arch; cross-compiles for other arches; optionally runs tests under QEMU for aarch64.
name: 'Build and Test'

description: 'Composite action that performs repository checkout, runs setup-rust composite action, builds and tests the project.'

inputs:
  arch:
    description: 'Target architecture for cross-compile. Set to x86_64 or aarch64 or leave empty for host.'
    required: false
    default: ''
  run-tests:
    description: 'Run tests after build (true/false).'
    required: false
    default: 'true'
  run-integration-tests:
    description: 'Run Redis integration test tier (true/false).'
    required: false
    default: 'false'
  qemu:
    description: 'Whether to enable QEMU during setup (true/false).'
    required: false
    default: 'false'
  runner:
    description: 'Runner OS name (used for macOS special setup)'
    required: false
    default: ''
  os_name:
    description: 'OS name for artifact naming (e.g., ubuntu-24.04, macos-14)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # Setup toolchain, qemu (optional) and caching via our setup-rust composite action
    - name: Setup Rust, QEMU & cache
      uses: ./.github/actions/setup-rust
      with:
        arch: ${{ inputs.arch }}
        qemu: ${{ inputs.qemu }}

    - name: Show Rust versions
      run: |
        rustc --version
        cargo --version
      shell: bash

    - name: Build (cargo)
      shell: bash
      run: |
        set -euo pipefail
        target_triple=""
        if [[ "${{ inputs.qemu }}" == "true" && "${{ inputs.arch }}" == "aarch64" ]]; then
          target_triple="aarch64-unknown-linux-gnu"
        fi

        if [[ -n "${target_triple}" ]]; then
          cargo build --release --target "${target_triple}"
        else
          cargo build --release
        fi

    - name: Compile test binaries (regression guard)
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        target_triple=""
        if [[ "${{ inputs.qemu }}" == "true" && "${{ inputs.arch }}" == "aarch64" ]]; then
          target_triple="aarch64-unknown-linux-gnu"
        fi

        if [[ -n "${target_triple}" ]]; then
          cargo test --release --tests --no-run --target "${target_triple}"
        else
          cargo test --release --tests --no-run
        fi

    - name: Run tiered tests (native x86_64)
      if: ${{ inputs.run-tests == 'true' && inputs.arch == 'x86_64' }}
      shell: bash
      run: |
        set -euo pipefail

        # unit tier
        cargo test --release --lib

        # functional tier (non-Redis)
        cargo test --release \
          --test config_test \
          --test handler_test \
          --test logging_fsync_test \
          --test functional_interface_mapping_test \
          --test functional_http_contract_test \
          --test functional_ws_contract_test

        # integration tier (Redis/process/socket)
        if [[ "${{ inputs.run-integration-tests }}" == "true" ]]; then
          cargo test --release \
            --test integration_process_boot_test \
            --test integration_redis_http_test \
            --test integration_redis_pubsub_test \
            --test integration_redis_socket_test \
            --test websocket_raw_test
        fi

    - name: Run tests under QEMU (if enabled)
      if: ${{ inputs.run-tests == 'true' && inputs.qemu == 'true' && inputs.arch == 'aarch64' }}
      uses: actions-rs/cargo@v1
      with:
        command: test
        args: |
          --release
          --target aarch64-unknown-linux-gnu

    - name: Archive logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: webdis-${{ inputs.os_name != '' && inputs.os_name || (inputs.arch != '' && inputs.arch || 'host') }}.log
        path: webdis.log
